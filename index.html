<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boka tid – N.O.S Nails Beauty AB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brick:#8C3A31;
  --brick-d:#6E2C25;
  --ink:#1F1F1F;
  --grey:#6B6B6B;
  --line:#E4E1DF;
  --bg:#F5F3F2;
  --card:#FFFFFF;
  --ok:#2E7D5B;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);
  font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:110px}
button,input,textarea,select{font:inherit;color:inherit}
[hidden]{display:none!important}
.wrap{max-width:720px;margin:0 auto;padding:0 16px}

/* ---------- Topp ---------- */
.top{background:var(--card);border-bottom:1px solid var(--line)}
.top .wrap{display:flex;align-items:center;gap:12px;padding-top:12px;padding-bottom:12px}
.top .name{font-weight:700;font-size:16px;flex:1;min-width:0}
.langs{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.langs button{background:#fff;border:0;padding:6px 10px;font-size:12px;font-weight:600;color:var(--grey);cursor:pointer}
.langs button.on{background:var(--brick);color:#fff}

/* ---------- Salongsinfo ---------- */
.info{background:var(--card);border-bottom:1px solid var(--line);padding:20px 0 22px}
.info h1{font-size:22px;font-weight:700;letter-spacing:-.01em}
.info .rows{margin-top:12px;display:grid;gap:6px;font-size:14px;color:var(--grey)}
.info .rows div{display:flex;gap:8px}
.info .rows b{color:var(--ink);font-weight:600}
.open{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;font-weight:600;color:var(--ok)}
.open i{width:7px;height:7px;border-radius:50%;background:var(--ok);font-style:normal}
.open.shut{color:var(--grey)} .open.shut i{background:var(--grey)}

/* ---------- Sektioner ---------- */
h2{font-size:17px;font-weight:700;margin:22px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.catlabel{padding:12px 16px 4px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--grey)}

/* rad: tjänst */
.row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-top:1px solid var(--line);cursor:pointer;background:none;border-left:0;border-right:0;border-bottom:0;width:100%;text-align:left}
.row:first-of-type{border-top:0}
.row:hover{background:#FAF8F7}
.row .t{flex:1;min-width:0}
.row .t b{display:block;font-weight:600;font-size:15px}
.row .t small{color:var(--grey);font-size:13px}
.row .pick{border:1px solid var(--brick);color:var(--brick);background:#fff;border-radius:8px;padding:8px 14px;
  font-size:14px;font-weight:600;white-space:nowrap}
.row.sel{background:#FBF3F1}
.row.sel .pick{background:var(--brick);color:#fff}

/* ---------- Datum ---------- */
.datebar{display:flex;gap:8px;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.datebar::-webkit-scrollbar{display:none}
.dbtn{flex:none;width:58px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:9px 0;
  text-align:center;cursor:pointer}
.dbtn small{display:block;font-size:11px;color:var(--grey);text-transform:uppercase;font-weight:600}
.dbtn b{display:block;font-size:17px;font-weight:700;margin-top:1px}
.dbtn.sel{background:var(--brick);border-color:var(--brick);color:#fff}
.dbtn.sel small{color:rgba(255,255,255,.8)}
.dbtn:disabled{opacity:.35;cursor:not-allowed}

/* filter thợ */
.filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.fbtn{flex:none;border:1px solid var(--line);background:var(--card);border-radius:99px;padding:8px 14px;
  font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap}
.fbtn.sel{border-color:var(--brick);background:#FBF3F1;color:var(--brick);font-weight:600}

/* tider */
.tgroup{margin-top:14px}
.tgroup h3{font-size:13px;font-weight:700;color:var(--grey);margin-bottom:8px}
.tlist{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.tbtn{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 0;font-size:15px;
  font-weight:600;cursor:pointer}
.tbtn:hover{border-color:var(--brick)}
.tbtn.sel{background:var(--brick);border-color:var(--brick);color:#fff}
.msg{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:22px;text-align:center;
  color:var(--grey);font-size:14px}

/* ---------- Form ---------- */
.form{padding:16px}
.field{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:12px 13px;background:#fff}
input:focus,textarea:focus{outline:0;border-color:var(--brick);box-shadow:0 0 0 3px rgba(140,58,49,.12)}
textarea{min-height:70px;resize:vertical}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:520px){.two{grid-template-columns:1fr}}
.recap{padding:14px 16px;background:#FBF3F1;border-bottom:1px solid var(--line)}
.recap div{display:flex;justify-content:space-between;gap:12px;font-size:14px;padding:3px 0}
.recap div span{color:var(--grey)}
.recap div b{font-weight:600;text-align:right}
.recap .tot{border-top:1px solid var(--line);margin-top:6px;padding-top:8px;font-size:16px}
.recap .tot b{color:var(--brick);font-weight:700}

/* ---------- Bekräftelse ---------- */
.done{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:30px 20px;text-align:center}
.check{width:48px;height:48px;border-radius:50%;background:var(--ok);color:#fff;display:grid;place-items:center;
  font-size:24px;margin:0 auto 14px}
.done h2{margin:0 0 4px}
.done .no{font-size:14px;color:var(--grey);margin-bottom:18px}
.done .no b{color:var(--ink);font-family:ui-monospace,monospace;font-size:15px}
.done .recap{background:none;border:0;text-align:left;max-width:340px;margin:0 auto;padding:0}
.done .recap div{border-bottom:1px solid var(--line);padding:9px 0}

/* ---------- Fot / knappar ---------- */
.bar{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);z-index:20}
.bar .wrap{display:flex;align-items:center;gap:12px;padding-top:12px;padding-bottom:12px}
.bar .sum{flex:1;min-width:0;font-size:13px;color:var(--grey);line-height:1.35}
.bar .sum b{display:block;color:var(--ink);font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{background:var(--brick);color:#fff;border:0;border-radius:8px;padding:13px 22px;font-weight:600;cursor:pointer}
.btn:hover{background:var(--brick-d)}
.btn:disabled{background:#D6D2D0;cursor:not-allowed}
.btn.gh{background:#fff;border:1px solid var(--line);color:var(--ink);padding:13px 16px}
.btn.gh:hover{background:#F5F3F2}
.err{background:#FDEEEB;border:1px solid var(--brick);color:var(--brick-d);border-radius:8px;padding:11px 13px;
  font-size:14px;margin:14px 0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
  border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{text-align:center;color:var(--grey);font-size:13px;padding:24px 16px}
footer a{color:var(--grey)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="top"><div class="wrap">
  <div class="name" id="topName">N.O.S Nails Beauty AB</div>
  <div class="langs">
    <button data-lang="sv" class="on">SV</button>
    <button data-lang="en">EN</button>
    <button data-lang="vi">VI</button>
  </div>
</div></div>

<div class="info"><div class="wrap">
  <h1 id="salonName">N.O.S Nails Beauty AB</h1>
  <div class="rows">
    <div><span>📍</span><span id="sAddr"></span></div>
    <div><span>📞</span><b id="sPhone"></b></div>
    <div><span>🕐</span><span id="sHours"></span></div>
  </div>
  <div class="open" id="openNow" hidden><i></i><span></span></div>
</div></div>

<main class="wrap">
  <div class="err" id="err" hidden></div>

  <!-- STEG 1: tjänst -->
  <section id="s1">
    <h2 data-t="h1">Välj behandling</h2>
    <div class="card" id="svcCard"><div class="msg" data-t="loading">Laddar…</div></div>
  </section>

  <!-- STEG 2: tid -->
  <section id="s2" hidden>
    <h2 data-t="h2">Välj tid</h2>
    <div class="filter" id="staffFilter"></div>
    <div class="datebar" id="dates"></div>
    <div id="times"></div>
  </section>

  <!-- STEG 3: uppgifter -->
  <section id="s3" hidden>
    <h2 data-t="h3">Dina uppgifter</h2>
    <div class="card">
      <div class="recap" id="recap"></div>
      <div class="form">
        <div class="two">
          <div class="field"><label data-t="fName">Namn</label><input id="fName" autocomplete="name"></div>
          <div class="field"><label data-t="fPhone">Telefon</label><input id="fPhone" type="tel" autocomplete="tel" placeholder="073-936 16 55"></div>
        </div>
        <div class="field"><label data-t="fMail">E-post</label><input id="fMail" type="email" autocomplete="email"></div>
        <div class="field"><label data-t="fNote">Meddelande (valfritt)</label><textarea id="fNote"></textarea></div>
      </div>
    </div>
  </section>

  <!-- STEG 4: klart -->
  <section id="s4" hidden>
    <div class="done">
      <div class="check">✓</div>
      <h2 data-t="doneH">Tiden är bokad</h2>
      <p class="no" data-t="doneNo">Bokningsnummer: <b id="bCode"></b></p>
      <div class="recap" id="doneRecap"></div>
      <p style="color:var(--grey);font-size:13px;margin:18px 0" data-t="doneNote">Bekräftelse skickas till din e-post.</p>
      <button class="btn gh" onclick="location.reload()" data-t="again">Boka en till tid</button>
    </div>
  </section>
</main>

<div class="bar" id="bar">
  <div class="wrap">
    <button class="btn gh" id="back" hidden data-t="back">Tillbaka</button>
    <div class="sum"><b id="sumMain" data-t="pickSvc">Välj en behandling</b><span id="sumSub"></span></div>
    <button class="btn" id="next" disabled data-t="next">Nästa</button>
  </div>
</div>

<footer>
  <span id="fSalon"></span> · <span id="fSocial"></span><br>
  <a href="#" id="fCancel" data-t="cancelLink">Avboka en tid</a>
</footer>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxAgRKP5UWX9V8O4OqlJpAQH5ynSxgnCTNMnfng_9YybMHALJFQ98Rxindhuqls2hk/exec';

const T={
 sv:{h1:'Välj behandling',h2:'Välj tid',h3:'Dina uppgifter',loading:'Laddar…',
  fName:'Namn',fPhone:'Telefon',fMail:'E-post',fNote:'Meddelande (valfritt)',
  next:'Nästa',back:'Tillbaka',confirm:'Bekräfta bokning',pickSvc:'Välj en behandling',
  pick:'Välj',picked:'Vald',anyStaff:'Alla',open:'Öppet nu',closed:'Stängt nu',
  morning:'Förmiddag',afternoon:'Eftermiddag',evening:'Kväll',
  noTimes:'Inga lediga tider den dagen. Prova en annan dag.',shutDay:'Stängt den dagen.',
  doneH:'Tiden är bokad',doneNo:'Bokningsnummer:',doneNote:'Bekräftelse skickas till din e-post.',
  again:'Boka en till tid',cancelLink:'Avboka en tid',
  rDate:'Datum',rTime:'Tid',rSvc:'Behandling',rStaff:'Tekniker',rPrice:'Pris',
  fill:'Fyll i namn och telefon.',min:'min',kr:'kr',
  cPrompt:'Ange ditt bokningsnummer:',cPhone:'Ange telefonnumret du bokade med:',cOk:'Bokningen är avbokad.'},
 en:{h1:'Choose a treatment',h2:'Choose a time',h3:'Your details',loading:'Loading…',
  fName:'Name',fPhone:'Phone',fMail:'Email',fNote:'Message (optional)',
  next:'Next',back:'Back',confirm:'Confirm booking',pickSvc:'Choose a treatment',
  pick:'Select',picked:'Selected',anyStaff:'Anyone',open:'Open now',closed:'Closed now',
  morning:'Morning',afternoon:'Afternoon',evening:'Evening',
  noTimes:'No times left that day. Try another day.',shutDay:'Closed that day.',
  doneH:'Your time is booked',doneNo:'Booking number:',doneNote:'A confirmation is sent to your email.',
  again:'Book another time',cancelLink:'Cancel a booking',
  rDate:'Date',rTime:'Time',rSvc:'Treatment',rStaff:'Technician',rPrice:'Price',
  fill:'Please fill in name and phone.',min:'min',kr:'SEK',
  cPrompt:'Enter your booking number:',cPhone:'Enter the phone number you booked with:',cOk:'The booking is cancelled.'},
 vi:{h1:'Chọn dịch vụ',h2:'Chọn giờ',h3:'Thông tin của bạn',loading:'Đang tải…',
  fName:'Họ tên',fPhone:'Điện thoại',fMail:'Email',fNote:'Ghi chú (không bắt buộc)',
  next:'Tiếp',back:'Quay lại',confirm:'Xác nhận đặt lịch',pickSvc:'Chọn dịch vụ',
  pick:'Chọn',picked:'Đã chọn',anyStaff:'Thợ nào cũng được',open:'Đang mở cửa',closed:'Đang đóng cửa',
  morning:'Buổi sáng',afternoon:'Buổi chiều',evening:'Buổi tối',
  noTimes:'Ngày này hết giờ trống. Thử ngày khác nhé.',shutDay:'Ngày này tiệm nghỉ.',
  doneH:'Đã đặt lịch xong',doneNo:'Mã đặt lịch:',doneNote:'Xác nhận đã gửi vào email của bạn.',
  again:'Đặt thêm lịch',cancelLink:'Huỷ lịch',
  rDate:'Ngày',rTime:'Giờ',rSvc:'Dịch vụ',rStaff:'Thợ',rPrice:'Giá',
  fill:'Vui lòng nhập tên và số điện thoại.',min:'phút',kr:'kr',
  cPrompt:'Nhập mã đặt lịch:',cPhone:'Nhập số điện thoại đã dùng khi đặt:',cOk:'Đã huỷ lịch.'}};
const WD={sv:['Sön','Mån','Tis','Ons','Tor','Fre','Lör'],en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],vi:['CN','T2','T3','T4','T5','T6','T7']};

let lang='sv', cfg=null, step=1, slots=[];
let sel={svc:null, staff:'any', date:null, time:null};

const $=s=>document.querySelector(s);
const t=k=>T[lang][k]||T.sv[k]||k;
const loc=()=>lang==='vi'?'vi-VN':lang==='en'?'en-GB':'sv-SE';
const svcName=s=>s.name[lang]||s.name.sv;

async function api(action,p={}){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action,...p})});
  const j=await r.json();
  if(!j.success) throw new Error(j.error||'Fel');
  return j.data;
}
function showErr(m){const e=$('#err');e.textContent=m||'';e.hidden=!m;if(m)e.scrollIntoView({block:'center'});}
function txt(){document.querySelectorAll('[data-t]').forEach(e=>{
  if(e.id==='bCode'||e.children.length) return; e.textContent=t(e.dataset.t);});}

document.querySelectorAll('.langs button').forEach(b=>b.onclick=()=>{
  lang=b.dataset.lang;
  document.querySelectorAll('.langs button').forEach(x=>x.classList.toggle('on',x===b));
  document.documentElement.lang=lang;
  render();
});

/* ---------- start ---------- */
(async function(){
  try{
    cfg=await api('getConfig');
    $('#topName').textContent=cfg.salon.name;
    $('#salonName').textContent=cfg.salon.name;
    $('#fSalon').textContent=cfg.salon.name;
    $('#fSocial').textContent=cfg.salon.social||'';
    $('#sAddr').textContent=cfg.salon.address||'';
    $('#sPhone').textContent=cfg.salon.phone||'';
    $('#sHours').textContent=hoursLine();
    openBadge();
    render();
  }catch(e){ showErr(e.message); }
})();

function hoursLine(){
  const h=cfg.hours.slice().sort((a,b)=>((a.weekday+6)%7)-((b.weekday+6)%7));
  return h.map(x=>`${WD[lang][x.weekday]} ${x.open}–${x.close}`).join(' · ');
}
function openBadge(){
  const now=new Date(), wd=now.getDay(), hm=now.toTimeString().slice(0,5);
  const h=cfg.hours.find(x=>x.weekday===wd);
  const isOpen=!!h && hm>=h.open && hm<h.close;
  const el=$('#openNow'); el.hidden=false;
  el.classList.toggle('shut',!isOpen);
  el.querySelector('span').textContent=isOpen?t('open'):t('closed');
}

/* ---------- render ---------- */
function render(){
  txt();
  if(cfg){ $('#sHours').textContent=hoursLine(); openBadge(); }
  drawServices(); drawStaff(); drawDates(); drawTimes(); drawRecap(); drawBar();
  [1,2,3,4].forEach(n=>{ $('#s'+n).hidden=(n!==step); });
  $('#bar').hidden = step===4;
}

function drawServices(){
  if(!cfg) return;
  const c=$('#svcCard'); c.innerHTML='';
  const cats=[...new Set(cfg.services.map(s=>s.category||''))];
  cats.forEach(cat=>{
    if(cat){const l=document.createElement('div');l.className='catlabel';l.textContent=cat;c.appendChild(l);}
    cfg.services.filter(s=>(s.category||'')===cat).forEach(s=>{
      const b=document.createElement('button');
      b.className='row'+(sel.svc&&sel.svc.id===s.id?' sel':'');
      b.innerHTML=`<div class="t"><b>${svcName(s)}</b><small>${s.minutes} ${t('min')} · ${s.price} ${t('kr')}</small></div>
                   <span class="pick">${sel.svc&&sel.svc.id===s.id?t('picked'):t('pick')}</span>`;
      b.onclick=()=>{ sel.svc=s; sel.staff='any'; sel.date=null; sel.time=null; slots=[]; step=2; render(); scrollTop(); };
      c.appendChild(b);
    });
  });
}

function drawStaff(){
  if(!cfg||!sel.svc) return;
  const f=$('#staffFilter'); f.innerHTML='';
  const list=cfg.staff.filter(s=>s.services==='ALL'||s.services.includes(sel.svc.id));
  const mk=(id,label)=>{
    const b=document.createElement('button');
    b.className='fbtn'+(sel.staff===id?' sel':'');
    b.textContent=label;
    b.onclick=()=>{ sel.staff=id; sel.time=null; if(sel.date) loadTimes(); else render(); };
    f.appendChild(b);
  };
  mk('any',t('anyStaff'));
  list.forEach(s=>mk(s.id,s.name));
}

function drawDates(){
  if(!cfg||!sel.svc) return;
  const box=$('#dates'); box.innerHTML='';
  const open=cfg.hours.map(h=>h.weekday), today=new Date();
  for(let i=0;i<(cfg.maxDaysAhead||30);i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    const iso=new Date(d.getTime()-d.getTimezoneOffset()*6e4).toISOString().slice(0,10);
    const b=document.createElement('button');
    b.className='dbtn'+(sel.date===iso?' sel':'');
    b.disabled=!open.includes(d.getDay());
    b.innerHTML=`<small>${WD[lang][d.getDay()]}</small><b>${d.getDate()}</b>
                 <small>${d.toLocaleDateString(loc(),{month:'short'}).replace('.','')}</small>`;
    b.onclick=()=>{ sel.date=iso; sel.time=null; loadTimes(); };
    box.appendChild(b);
  }
}

async function loadTimes(){
  showErr('');
  drawDates();
  $('#times').innerHTML=`<div class="msg">${t('loading')}</div>`;
  try{
    const r=await api('getSlots',{date:sel.date,serviceId:sel.svc.id,staffId:sel.staff});
    slots=r.slots||[];
    drawTimes(r.closed); drawBar();
  }catch(e){ showErr(e.message); $('#times').innerHTML=''; }
}

function drawTimes(closed){
  const box=$('#times'); if(!box||step!==2) return;
  if(!sel.date){ box.innerHTML=`<div class="msg">${t('noTimes').replace(/\.$/,'')}</div>`; return; }
  if(!slots.length){ box.innerHTML=`<div class="msg">${closed?t('shutDay'):t('noTimes')}</div>`; return; }
  const groups=[[t('morning'),s=>s.time<'12:00'],[t('afternoon'),s=>s.time>='12:00'&&s.time<'17:00'],[t('evening'),s=>s.time>='17:00']];
  box.innerHTML='';
  groups.forEach(([title,fn])=>{
    const g=slots.filter(fn); if(!g.length) return;
    const w=document.createElement('div'); w.className='tgroup';
    w.innerHTML=`<h3>${title}</h3>`;
    const l=document.createElement('div'); l.className='tlist';
    g.forEach(s=>{
      const b=document.createElement('button');
      b.className='tbtn'+(sel.time===s.time?' sel':'');
      b.textContent=s.time;
      b.onclick=()=>{ sel.time=s.time; drawTimes(); drawBar(); };
      l.appendChild(b);
    });
    w.appendChild(l); box.appendChild(w);
  });
}

function drawRecap(){
  if(step!==3||!sel.svc) return;
  const st=sel.staff==='any'?t('anyStaff'):cfg.staff.find(s=>s.id===sel.staff).name;
  const d=new Date(sel.date+'T12:00:00');
  $('#recap').innerHTML=[
    [t('rSvc'), svcName(sel.svc)],
    [t('rDate'), d.toLocaleDateString(loc(),{weekday:'long',day:'numeric',month:'long'})],
    [t('rTime'), sel.time],
    [t('rStaff'), st]
  ].map(([k,v])=>`<div><span>${k}</span><b>${v}</b></div>`).join('')+
   `<div class="tot"><span>${t('rPrice')}</span><b>${sel.svc.price} ${t('kr')}</b></div>`;
}

function drawBar(){
  const b=$('#back'), n=$('#next');
  b.hidden=step===1; b.textContent=t('back');
  n.textContent = step===3 ? t('confirm') : t('next');
  let ok=false;
  if(step===1){ $('#sumMain').textContent=t('pickSvc'); $('#sumSub').textContent=''; }
  else if(sel.svc){
    $('#sumMain').textContent=svcName(sel.svc);
    const p=[`${sel.svc.price} ${t('kr')}`,`${sel.svc.minutes} ${t('min')}`];
    if(sel.date&&sel.time){
      const d=new Date(sel.date+'T12:00:00');
      p.push(`${d.toLocaleDateString(loc(),{day:'numeric',month:'short'})} ${sel.time}`);
    }
    $('#sumSub').textContent=p.join(' · ');
  }
  if(step===2) ok=!!(sel.date&&sel.time);
  if(step===3) ok=true;
  n.disabled=!ok;
}

const scrollTop=()=>window.scrollTo({top:0,behavior:'smooth'});
$('#back').onclick=()=>{ step=Math.max(1,step-1); showErr(''); render(); scrollTop(); };
$('#next').onclick=async()=>{
  showErr('');
  if(step<3){ step++; render(); scrollTop(); return; }
  const name=$('#fName').value.trim(), phone=$('#fPhone').value.trim();
  if(name.length<2||phone.length<6){ showErr(t('fill')); return; }
  const n=$('#next'); n.disabled=true; n.innerHTML='<span class="spin"></span>';
  try{
    const b=await api('book',{date:sel.date,time:sel.time,serviceId:sel.svc.id,staffId:sel.staff,
      customer:name,phone:phone,email:$('#fMail').value.trim(),note:$('#fNote').value.trim()});
    $('#bCode').textContent=b.code;
    const d=new Date(b.date+'T12:00:00');
    $('#doneRecap').innerHTML=[
      [t('rSvc'), b.service[lang]||b.service.sv],
      [t('rDate'), d.toLocaleDateString(loc(),{weekday:'long',day:'numeric',month:'long'})],
      [t('rTime'), b.time+' – '+b.end],
      [t('rStaff'), b.staff],
      [t('rPrice'), b.price+' '+t('kr')]
    ].map(([k,v])=>`<div><span>${k}</span><b>${v}</b></div>`).join('');
    step=4; render(); scrollTop();
  }catch(e){
    showErr(e.message);
    if(/ledig|available|trống/i.test(e.message)){ step=2; render(); loadTimes(); }
  }finally{ n.disabled=false; n.textContent=t('confirm'); drawBar(); }
};

$('#fCancel').onclick=async ev=>{
  ev.preventDefault();
  const code=prompt(t('cPrompt')); if(!code) return;
  const phone=prompt(t('cPhone')); if(!phone) return;
  try{ await api('cancel',{code,phone}); alert(t('cOk')); }catch(e){ alert(e.message); }
};
</script>
</body>
</html>
